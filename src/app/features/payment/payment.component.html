<div class="container" style="max-width:480px;padding:3rem 1rem" role="main">
  @if (!successData()) {
  <div @fadeInUp class="card" style="overflow:hidden">
    <div style="padding:2rem;text-align:center;border-bottom:1px solid var(--border)">
      <div class="icon-container" style="margin:0 auto 1rem;width:3rem;height:3rem" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:0.25rem">Secure Checkout</h1>
      <p style="color:var(--text-secondary);font-size:0.9375rem">Mock payment flow</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="pay()" style="padding:1.75rem;display:flex;flex-direction:column;gap:1.25rem"
      novalidate>
      <div class="form-group">
        <label class="form-label" for="card">Card Number</label>
        <input id="card" type="text" class="form-input card-input" formControlName="card" placeholder="0000 0000 0000 0000">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label class="form-label" for="expiry">Expiry Date</label>
          <input id="expiry" type="text" class="form-input" formControlName="expiry" placeholder="MM/YY">
        </div>
        <div class="form-group">
          <label class="form-label" for="cvc">CVC</label>
          <input id="cvc" type="password" class="form-input" formControlName="cvc" placeholder="123" maxlength="4">
        </div>
      </div>

      <div style="margin-top:0.5rem">
        <button type="submit" class="btn btn-primary" style="width:100%;height:3rem;font-size:1rem"
          [disabled]="form.invalid || loading()">
          {{ loading() ? 'Processing…' : 'Pay now' }}
        </button>
      </div>

      <div
        style="display:flex;align-items:center;justify-content:center;gap:0.5rem;font-size:0.8125rem;color:var(--text-secondary)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Secured with 256-bit encryption
      </div>
    </form>
  </div>
  } @else {
  <div @fadeInUp class="card" style="text-align:center;padding:3rem 2rem">
    <div
      style="width:5rem;height:5rem;background:#DCFCE7;color:#16a34a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem"
      aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path class="checkmark-circle" d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline class="checkmark-check" points="22 4 12 14.01 9 11.01" />
      </svg>
    </div>
    <h2 style="font-size:1.75rem;font-weight:800;margin-bottom:0.5rem">Order Confirmed</h2>
    <p style="color:var(--text-secondary);margin-bottom:1.5rem">Your payment was successful and the deal is locked in.
    </p>

    <div
      style="background:#F9FAFB;border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:2rem;font-size:0.875rem">
      <div style="color:var(--text-secondary);margin-bottom:0.25rem">Order Number</div>
      <div class="order-number">{{ successData()?.order_number }}</div>
    </div>

    <button class="btn btn-primary" style="width:100%" (click)="router.navigate(['/my-hubs'])">Back to My Hubs</button>
  </div>
  }
</div>
